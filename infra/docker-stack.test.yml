# ============================================================
# llm-automation — 테스트 환경 Docker Swarm Stack
# single-node Swarm 전용 (compose 모드 미사용)
# architecture_test.md §3, §11 참조
# ============================================================
# 사용법:
#   set -a; . ./infra/sample.env; set +a
#   docker stack deploy -c infra/docker-stack.test.yml llmauto
# ============================================================

version: "3.9"

services:
  # ─── Manager 라벨 서비스 (인프라) ─────────────────────────

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      placement:
        constraints:
          - node.labels.node-role.manager == true
      replicas: 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      placement:
        constraints:
          - node.labels.node-role.manager == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    deploy:
      placement:
        constraints:
          - node.labels.node-role.manager == true
      replicas: 1
    depends_on:
      - redis

  gitea:
    image: gitea/gitea:latest
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=http://localhost:3000
    deploy:
      placement:
        constraints:
          - node.labels.node-role.manager == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/3000' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Worker 라벨 서비스 (애플리케이션) ────────────────────

  leebalso-mock:
    image: leebalso-mock:latest
    ports:
      - "9100:9100"
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/health').read()\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Phase 3: RAG ────────────────────────────────────────
  rag-mcp:
    image: rag-mcp:latest
    ports:
      - "9001:9001"
    environment:
      - CHAT_LLM_BASE_URL=${CHAT_LLM_BASE_URL}
      - CHAT_LLM_MODEL=${CHAT_LLM_MODEL}
      - CHAT_LLM_API_KEY=${OPENAI_API_KEY}
      - REASONING_LLM_BASE_URL=${REASONING_LLM_BASE_URL}
      - REASONING_LLM_MODEL=${REASONING_LLM_MODEL}
      - REASONING_LLM_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_DIM=${EMBEDDING_DIM}
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9001/health').read()\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Phase 4: ConfigAudit MCP ────────────────────────────
  configaudit-mcp:
    image: configaudit-mcp:latest
    ports:
      - "9002:9002"
    environment:
      - LEEBALSO_BASE_URL=http://leebalso-mock:9100
    depends_on:
      - leebalso-mock
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9002/health').read()\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Phase 5: Webhook Gateway ────────────────────────────
  flask-webhook:
    image: flask-webhook:latest
    ports:
      - "8080:8080"
    environment:
      - WEBHOOK_HOST=0.0.0.0
      - WEBHOOK_PORT=8080
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - DEDUP_TTL_SECONDS=${DEDUP_TTL_SECONDS}
    depends_on:
      - redis
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health').read()\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Phase 5: Comment Worker (Phase 6 에서 FixtureGitClient 지원) ──
  celery-comment:
    image: celery-comment:latest
    command: ["python", "-m", "celery", "-A", "celery_comment.worker:celery_app", "worker", "-Q", "comment_queue", "-l", "info"]
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - COMMENT_WORK_DIR=${COMMENT_WORK_DIR}
      - RAG_MCP_URL=${RAG_MCP_URL}
      - AGENT_RUNNER_KIND=${AGENT_RUNNER_KIND}
      - AGENT_TIMEOUT_SECONDS=${AGENT_TIMEOUT_SECONDS}
      - GIT_COMMIT_AUTHOR=${GIT_COMMIT_AUTHOR}
      - GIT_CLIENT=${GIT_CLIENT}
      - FIXTURE_SOURCE_DIR=${FIXTURE_SOURCE_DIR}
      - FIXTURE_RESULT_DIR=${FIXTURE_RESULT_DIR}
      - CHAT_LLM_BASE_URL=${CHAT_LLM_BASE_URL}
      - CHAT_LLM_MODEL=${CHAT_LLM_MODEL}
      - CHAT_LLM_API_KEY=${OPENAI_API_KEY}
      - CHAT_LLM_TIMEOUT_SECONDS=${CHAT_LLM_TIMEOUT_SECONDS:-120}
    volumes:
      - ${FIXTURE_SOURCE_DIR}:${FIXTURE_SOURCE_DIR}
      - ${FIXTURE_RESULT_DIR}:${FIXTURE_RESULT_DIR}
      - ${COMMENT_WORK_DIR}:${COMMENT_WORK_DIR}
    depends_on:
      - redis
      - rag-mcp
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1

  # ─── Phase 5: ConfigAudit Worker ─────────────────────────
  celery-configaudit:
    image: celery-configaudit:latest
    command: ["python", "-m", "celery", "-A", "celery_configaudit.worker:celery_app", "worker", "-Q", "configaudit_queue", "-l", "info"]
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CONFIGAUDIT_MCP_URL=${CONFIGAUDIT_MCP_URL}
      - REPORT_OUTPUT_DIR=${REPORT_OUTPUT_DIR}
      - REASONING_LLM_BASE_URL=${REASONING_LLM_BASE_URL}
      - REASONING_LLM_MODEL=${REASONING_LLM_MODEL}
      - REASONING_LLM_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ${REPORT_OUTPUT_DIR}:${REPORT_OUTPUT_DIR}
    depends_on:
      - redis
      - configaudit-mcp
    deploy:
      placement:
        constraints:
          - node.labels.node-role.worker == true
      replicas: 1

volumes:
  redis-data:
  qdrant-data:
  gitea-data:
